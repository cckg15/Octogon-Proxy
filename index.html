<script>
    async function fetchPage() {
        const input = document.getElementById('urlInput').value;
        const output = document.getElementById('output');
        const frame = document.createElement('iframe');
        
        // Style the iframe to fill the space
        frame.style.width = "100%";
        frame.style.height = "600px";
        frame.style.border = "none";
        
        output.innerHTML = "Loading...";

        try {
            const response = await fetch(`/proxy?url=${encodeURIComponent(input)}`);
            const html = await response.text();
            
            // Clear the "Loading..." text
            output.innerHTML = "";
            output.appendChild(frame);

            // Inject the code into the iframe
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open();
            
            // Add a <base> tag so images and CSS load from the real site
            const baseTag = `<base href="${input}" target="_blank">`;
            doc.write(html.replace('<head>', '<head>' + baseTag));
            
            doc.close();
        } catch (err) {
            output.innerText = "Error: " + err.message;
        }
    }
</script>

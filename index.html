<!DOCTYPE html>
<html>
<head>
    <title>Open Math</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>Research Portal</h1>
        <form id="proxy-form">
            <input type="text" id="url-input" placeholder="Search or enter a URL..." autocomplete="off">
        </form>
        <p>Type a URL and press Enter</p>
    </div>

    <script>
        // Register the Service Worker
        if ('serviceWorker' in navigator) {
            navigator.servicwWorker.register('./sw.js', {
                scope: './' 
            }).then(reg => {
                console.log('Engine active at scope:', reg.scope);
            }).catch(err => {
                console.error('Engine failed:', err);
            });
        }
        document.getElementById('proxy-form').addEventListener('submit', e => {
            e.preventDefault();
            const input = document.getElementById('url-input').value;
            let url = input.trim();

            if (!url.startsWith('http')) url = 'https://' + url;
            
            // Redirect to the proxy handler
            // Most proxies use a specific prefix to trigger the Service Worker
            window.location.href = "./service/" + btoa(url).replace(/\//g, '_');
        });
    </script>
</body>
</html>

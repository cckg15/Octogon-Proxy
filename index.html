<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #27c93f; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #output { background: white; color: black; margin-top: 20px; text-align: left; padding: 20px; min-height: 300px; border-radius: 8px; overflow: auto; }
    </style>
</head>
<body>
    <h2>My Private Proxy</h2>
    <input type="text" id="urlInput" placeholder="https://wikipedia.org">
    <button onclick="fetchPage()">Go</button>
    <div id="output">Results will appear here...</div>

    <script>
        async function fetchPage() {
            const input = document.getElementById('urlInput').value;
            const output = document.getElementById('output');
            output.innerText = "Loading...";

            try {
                // Since this HTML is served by our Render app, we just use /proxy
                const response = await fetch(`/proxy?url=${encodeURIComponent(input)}`);
                const data = await response.text();
                output.innerText = data; // Displays the code of the site
            } catch (err) {
                output.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
